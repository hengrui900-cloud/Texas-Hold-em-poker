<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Strategy Studio Table</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">TH</div>
          <div>
            <h1>Strategy Studio Table</h1>
            <span>Texas Hold'em</span>
          </div>
        </div>
        <div class="top-actions">
          <button id="newHandTop" class="ghost-button">New Hand</button>
          <button id="reloadState" class="ghost-button">Refresh</button>
          <label class="select-label">
            Difficulty
            <select id="difficultySelect">
              <option>Mixed</option>
              <option>Conservative</option>
              <option>Aggressive</option>
            </select>
          </label>
          <div class="device-pill" id="devicePill">device: loading</div>
        </div>
      </header>

      <section class="game-layout">
        <section class="table-stage" aria-label="Poker table">
          <div class="street-steps" id="streetSteps"></div>
          <div class="table-wrap">
            <img class="table-image" src="/assets/poker-table-cropped.png" alt="Empty poker table" />
            <div class="pot-pill" id="potPill">Pot: 0 BB</div>
            <div class="community" id="communityCards"></div>
            <div class="table-wordmark">TEXAS HOLD'EM</div>
            <div class="seat seat-top" id="seat1"></div>
            <div class="seat seat-right" id="seat2"></div>
            <div class="seat seat-left" id="seat3"></div>
            <div class="seat seat-bottom" id="seat0"></div>
          </div>
          <div class="action-rail">
            <button class="action-button fold" data-action="fold">Fold</button>
            <button class="action-button call" data-action="check_call">Check / Call</button>
            <button class="action-button raise" data-action="raise_half_pot">Raise 1/2 Pot</button>
            <button class="action-button raise" data-action="raise_pot">Raise Pot</button>
            <button class="action-button allin" data-action="all_in">All-in</button>
          </div>
          <div class="raise-strip">
            <label>
              Raise Amount
              <input id="raiseAmount" value="0.0" readonly />
            </label>
            <input id="raiseSlider" type="range" min="0" max="100" value="0" />
            <button class="small-button" id="quickHalf">1/2 Pot</button>
            <button class="small-button" id="quickPot">Pot</button>
            <button class="small-button" id="quickMax">Max</button>
          </div>
        </section>

        <aside class="inspector" aria-label="Strategy inspector">
          <div class="street-mini" id="streetMini"></div>
          <section class="panel">
            <div class="panel-heading">
              <h2>AI Thinking</h2>
              <span id="thinkingActor">Waiting</span>
            </div>
            <div id="thinkingBody"></div>
          </section>
          <section class="panel">
            <div class="panel-heading">
              <h2>Legal Actions</h2>
              <span id="legalCount">0</span>
            </div>
            <div id="legalActions"></div>
          </section>
          <section class="panel">
            <div class="panel-heading">
              <h2>Q Values</h2>
              <span>-1.0 to 1.0</span>
            </div>
            <div id="qValues"></div>
          </section>
          <section class="panel">
            <div class="panel-heading">
              <h2>Last 5 Actions</h2>
              <span>All players</span>
            </div>
            <div id="actionLog"></div>
          </section>
          <section class="panel">
            <div class="panel-heading">
              <h2>Win / Loss Trend</h2>
              <span id="trendStats">0 hands</span>
            </div>
            <div class="trend" id="trendChart"></div>
          </section>
        </aside>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
